# Vex quick-start — single-node, RESP on port 6380, AOF persistence.
#
# This is the minimal "try Vex on Kubernetes" manifest. It is NOT a
# production HA topology — replicated/HA deployment and lifecycle management
# live in the vex-operator project (github.com/vex-db/vex-operator).
#
# Apply:   kubectl apply -f deploy/k8s/quickstart.yaml
# Access:  kubectl port-forward svc/vex 6380:6380
#          redis-cli -p 6380 PING        # -> PONG
# Logs:    kubectl logs deploy/vex -f
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vex-data
  labels:
    app.kubernetes.io/name: vex
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vex
  labels:
    app.kubernetes.io/name: vex
spec:
  replicas: 1
  strategy:
    # Recreate so the single RWO PVC isn't held by two pods during rollout.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vex
    spec:
      terminationGracePeriodSeconds: 10
      # The image runs as uid 10001 (user 'vex'); fsGroup makes the kubelet
      # chown the volume so vex can write /data/vex.aof.
      securityContext:
        fsGroup: 10001
      containers:
        - name: vex
          image: ghcr.io/pratyush-sngh/vex:latest
          imagePullPolicy: IfNotPresent
          args:
            - --port
            - "6380"
            - --data-dir
            - /data
            - --appendonly
            - "yes"
          ports:
            - containerPort: 6380
              name: resp
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 6380
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6380
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vex-data
---
apiVersion: v1
kind: Service
metadata:
  name: vex
  labels:
    app.kubernetes.io/name: vex
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vex
  ports:
    - port: 6380
      targetPort: 6380
      protocol: TCP
      name: resp
